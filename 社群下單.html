<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png?v=2">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <title>│Mina 社群專屬│</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fdfbf7;
      --accent: #d4a373;
      --accent-light: #faeadd;
      --text: #2c2c2c;
      --text-sub: #666;
      --price: #bfa092;
      --comm-price: #c05c1a;
      --border: #e8e0d8;
      --white: #fff;
      --comm-banner: #fff5ef;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── 連結失效畫面 ── */
    #invalid-screen {
      display: none; position: fixed; inset: 0; background: var(--bg);
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; text-align: center; padding: 40px;
    }
    #invalid-screen .icon { font-size: 3rem; margin-bottom: 16px; }
    #invalid-screen h2 { font-size: 1.2rem; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    #invalid-screen p  { font-size: 0.9rem; color: var(--text-sub); line-height: 1.8; }

    /* ── Header ── */
    .site-header {
      background: var(--comm-banner);
      border-bottom: 2px solid var(--accent);
      padding: 18px 20px 14px;
      text-align: center;
      position: sticky; top: 0; z-index: 100;
    }
    .site-header .brand {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.6rem; font-style: italic; font-weight: 600;
      color: var(--text); letter-spacing: 2px;
    }
    .site-header .sub {
      font-size: 0.68rem; letter-spacing: 4px; color: var(--accent);
      text-transform: uppercase; margin-top: 2px;
    }
    .comm-badge {
      display: inline-block; background: var(--accent); color: #fff;
      font-size: 0.7rem; letter-spacing: 2px; padding: 2px 10px;
      border-radius: 20px; margin-top: 6px;
    }

    /* ── 購物車按鈕 ── */
    .cart-fab {
      position: fixed; bottom: 24px; right: 20px; z-index: 500;
      background: var(--accent); color: #fff; border: none;
      border-radius: 50px; padding: 12px 20px;
      font-size: 0.9rem; font-family: inherit; cursor: pointer;
      box-shadow: 0 4px 16px rgba(212,163,115,.45);
      display: flex; align-items: center; gap: 8px;
      transition: transform .15s;
    }
    .cart-fab:active { transform: scale(.96); }
    .cart-fab .cnt {
      background: #fff; color: var(--accent);
      border-radius: 50%; width: 22px; height: 22px;
      font-size: 0.75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── 商品列表 ── */
    .main-wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 120px; }
    .section-title {
      font-size: 0.72rem; letter-spacing: 4px; color: var(--accent);
      text-transform: uppercase; margin-bottom: 18px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    .product-card {
      background: var(--white); border-radius: 12px;
      overflow: hidden; cursor: pointer;
      box-shadow: 0 2px 10px rgba(160,120,80,.08);
      transition: transform .15s, box-shadow .15s;
    }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(160,120,80,.15); }
    .product-card img {
      width: 100%; aspect-ratio: 1; object-fit: cover;
      background: #f5f0eb;
    }
    .product-card .no-img {
      width: 100%; aspect-ratio: 1; background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
    }
    .product-card .info { padding: 12px 14px 14px; }
    .product-card .name {
      font-size: 0.88rem; font-weight: 500; color: var(--text);
      margin-bottom: 8px; line-height: 1.45;
    }
    .price-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .price-orig { font-size: 0.75rem; color: #bbb; text-decoration: line-through; }
    .price-comm {
      font-size: 0.95rem; font-weight: 600; color: var(--comm-price);
    }
    .price-normal { font-size: 0.95rem; font-weight: 500; color: var(--price); }
    .tag-badge {
      display: inline-block; font-size: 0.62rem; padding: 1px 6px;
      border-radius: 4px; font-weight: 600; margin-bottom: 4px;
    }
    .tag-new  { background: #d4ead9; color: #1d6b48; }
    .tag-hot  { background: #fde8d8; color: #c45c1a; }
    .tag-sale { background: #fde8e8; color: #c0392b; }
    .comm-only-tag {
      display: inline-block; font-size: 0.6rem; padding: 1px 7px;
      border-radius: 4px; background: var(--accent-light); color: var(--accent);
      font-weight: 600; margin-bottom: 4px; letter-spacing: 1px;
    }

    /* ── 商品 Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 1000;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    @media(min-width:600px) { .modal-overlay { align-items: center; } }
    .modal {
      background: var(--white); width: 100%; max-width: 480px;
      border-radius: 20px 20px 0 0; max-height: 90vh;
      overflow-y: auto; padding: 24px 20px 32px;
    }
    @media(min-width:600px) { .modal { border-radius: 16px; } }
    .modal-img {
      width: 100%; aspect-ratio: 1; object-fit: cover;
      border-radius: 10px; margin-bottom: 16px; background: #f5f0eb;
    }
    .modal-name { font-size: 1rem; font-weight: 600; margin-bottom: 8px; line-height: 1.5; }
    .modal-desc { font-size: 0.82rem; color: var(--text-sub); line-height: 1.7; margin-bottom: 14px; }
    .modal-price-box {
      background: var(--acc-light); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .modal-price-box .label { font-size: 0.75rem; color: var(--text-sub); }
    .modal-price-box .val   { font-size: 1.1rem; font-weight: 700; color: var(--comm-price); }
    .modal-price-box .orig-val { font-size: 0.8rem; color: #bbb; text-decoration: line-through; }
    .spec-label { font-size: 0.78rem; color: var(--text-sub); margin-bottom: 6px; font-weight: 500; }
    .spec-list  { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .spec-btn {
      padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--white); font-size: 0.85rem; font-family: inherit;
      cursor: pointer; text-align: left; transition: all .12s;
      display: flex; justify-content: space-between; align-items: center;
    }
    .spec-btn:hover  { border-color: var(--accent); }
    .spec-btn.active { border-color: var(--accent); background: var(--accent-light); font-weight: 500; }
    .spec-btn.sold-out { color: #bbb; cursor: not-allowed; }
    .spec-price { font-size: 0.82rem; font-weight: 600; color: var(--comm-price); }
    .qty-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
    }
    .qty-row label { font-size: 0.78rem; color: var(--text-sub); font-weight: 500; }
    .qty-ctrl {
      display: flex; align-items: center; gap: 0;
      border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    .qty-ctrl button {
      width: 36px; height: 36px; background: none; border: none;
      font-size: 1.1rem; cursor: pointer; color: var(--text);
      transition: background .1s;
    }
    .qty-ctrl button:hover { background: var(--accent-light); }
    .qty-ctrl span { min-width: 32px; text-align: center; font-size: 0.9rem; font-weight: 500; }
    .btn-add-cart {
      width: 100%; padding: 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-size: 0.95rem; font-family: inherit;
      font-weight: 500; cursor: pointer; transition: opacity .15s;
    }
    .btn-add-cart:hover { opacity: .88; }
    .btn-add-cart:disabled { background: #ccc; cursor: not-allowed; }
    .modal-close-btn {
      position: sticky; top: 0; float: right; background: #f0ece8;
      border: none; border-radius: 50%; width: 32px; height: 32px;
      font-size: 1rem; cursor: pointer; color: var(--text-sub);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
    }

    /* ── 購物車 Modal ── */
    .cart-modal { max-width: 520px; border-radius: 20px 20px 0 0; padding: 24px 20px 32px; }
    @media(min-width:600px) { .cart-modal { border-radius: 16px; } }
    .cart-title { font-size: 1rem; font-weight: 600; margin-bottom: 18px; }
    .cart-item {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .cart-item img { width: 56px; height: 56px; object-fit: cover; border-radius: 8px; background: #f5f0eb; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 0.85rem; font-weight: 500; line-height: 1.4; }
    .cart-item-spec { font-size: 0.75rem; color: var(--text-sub); margin-top: 2px; }
    .cart-item-price { font-size: 0.85rem; color: var(--comm-price); font-weight: 600; white-space: nowrap; }
    .cart-item-rm { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1.1rem; padding: 0 4px; }
    .cart-item-rm:hover { color: #e05c5c; }
    .cart-total-row {
      display: flex; justify-content: flex-end; align-items: center;
      gap: 12px; padding: 14px 0 18px;
      font-size: 1rem; font-weight: 700; color: var(--text);
    }
    .cart-total-row span:last-child { color: var(--comm-price); }
    .shipping-section { margin-bottom: 16px; }
    .shipping-section label { font-size: 0.78rem; color: var(--text-sub); font-weight: 500; display: block; margin-bottom: 8px; }
    .shipping-opts { display: flex; gap: 8px; flex-wrap: wrap; }
    .shipping-opt {
      flex: 1; min-width: 120px; padding: 10px 12px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.82rem; font-family: inherit; cursor: pointer;
      background: var(--white); text-align: center; transition: all .12s;
    }
    .shipping-opt.active { border-color: var(--accent); background: var(--accent-light); font-weight: 500; }
    .btn-checkout {
      width: 100%; padding: 14px; background: #06c755; color: #fff;
      border: none; border-radius: 10px; font-size: 0.95rem; font-family: inherit;
      font-weight: 500; cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 8px; transition: opacity .15s;
    }
    .btn-checkout:hover { opacity: .9; }
    .btn-checkout:disabled { background: #ccc; cursor: not-allowed; }

    /* ── QR Modal ── */
    .qr-modal { max-width: 380px; border-radius: 16px; text-align: center; padding: 32px 24px; }
    .qr-modal h3 { margin-bottom: 16px; font-size: 1rem; }
    .qr-modal img { max-width: 240px; border: 1px solid #eee; padding: 8px; border-radius: 8px; margin-bottom: 16px; }
    .qr-modal p { font-size: 0.82rem; color: var(--text-sub); line-height: 1.7; margin-bottom: 16px; }
    .btn-close-qr { padding: 10px 24px; background: var(--border); border: none; border-radius: 8px; font-size: 0.88rem; cursor: pointer; }

    /* ── Loading ── */
    .loading-wrap { text-align: center; padding: 60px 20px; color: var(--text-sub); font-size: 0.9rem; }

    @media (max-width: 480px) {
      .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }
  </style>
</head>
<body>

<!-- 連結失效畫面 -->
<div id="invalid-screen">
  <div class="icon">🔒</div>
  <h2>連結已失效</h2>
  <p>此連結已過期或不正確。<br>請向社群管理員索取本期最新連結。</p>
</div>

<!-- Header -->
<header class="site-header" id="main-header" style="display:none">
  <div class="brand">Mina's Journal</div>
  <div class="sub">Community Shop</div>
  <div><span class="comm-badge">社群專屬</span></div>
</header>

<!-- 購物車 FAB -->
<button class="cart-fab" id="cart-fab" onclick="openCart()" style="display:none">
  🛍 購物車 <span class="cnt" id="cart-cnt">0</span>
</button>

<!-- 主內容 -->
<div class="main-wrap" id="main-content" style="display:none">
  <div class="section-title">社群專屬商品</div>
  <div class="product-grid" id="product-grid">
    <div class="loading-wrap" style="grid-column:1/-1">載入中…</div>
  </div>
</div>

<!-- 商品詳情 Modal -->
<div class="modal-overlay" id="product-modal" onclick="closeProductModal(event)">
  <div class="modal" id="product-modal-inner">
    <button class="modal-close-btn" onclick="closeProductModalBtn()">✕</button>
    <img class="modal-img" id="m-img" src="" alt="">
    <div class="modal-name" id="m-name"></div>
    <div class="modal-desc" id="m-desc"></div>
    <div class="modal-price-box" id="m-price-box"></div>
    <div class="spec-label">選擇規格</div>
    <div class="spec-list" id="m-specs"></div>
    <div class="qty-row">
      <label>數量</label>
      <div class="qty-ctrl">
        <button onclick="changeQty(-1)">－</button>
        <span id="m-qty">1</span>
        <button onclick="changeQty(1)">＋</button>
      </div>
    </div>
    <button class="btn-add-cart" id="m-add-btn" onclick="addToCart()">加入購物車</button>
  </div>
</div>

<!-- 購物車 Modal -->
<div class="modal-overlay" id="cart-modal" onclick="closeCartModal(event)">
  <div class="modal cart-modal" id="cart-modal-inner">
    <div class="cart-title">購物車</div>
    <div id="cart-items"></div>
    <div class="cart-total-row">合計：<span id="cart-total">NT$ 0</span></div>
    <div class="shipping-section">
      <label>下單平台</label>
      <div class="shipping-opts">
        <button class="shipping-opt" onclick="selectShipping(this,'7-11 賣貨便')">7-11 賣貨便</button>
        <button class="shipping-opt" onclick="selectShipping(this,'iOPEN Mall')">iOPEN Mall</button>
        <button class="shipping-opt" onclick="selectShipping(this,'面交')">面交</button>
      </div>
    </div>
    <button class="btn-checkout" id="checkout-btn" onclick="checkout()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.630 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.630 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
      傳送至 LINE 官方帳號
    </button>
  </div>
</div>

<!-- QR Code Modal -->
<div class="modal-overlay" id="qr-modal" onclick="closeQrModal(event)">
  <div class="modal qr-modal" id="qr-modal-inner">
    <h3>掃描 QR Code 完成下單</h3>
    <div id="qr-body"></div>
    <button class="btn-close-qr" onclick="document.getElementById('qr-modal').classList.remove('open')">關閉</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, query, where, addDoc, serverTimestamp, runTransaction, doc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAWWzDwfnPcPYXP7-yi10iQPq_wriZNUJg",
  authDomain: "minashop-c089a.firebaseapp.com",
  projectId: "minashop-c089a",
  storageBucket: "minashop-c089a.firebasestorage.app",
  messagingSenderId: "201093013608",
  appId: "1:201093013608:web:8b4e6b0f5506ca437fdbdd"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ─── 連結驗證 ───
const _COMM_SECRET = 'Mn@MinaZhuang2024';
function getExpectedToken() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const h = now.getDate() <= 14 ? 'A' : 'B';
  return btoa(`${_COMM_SECRET}_${y}${m}${h}`).replace(/[+/=]/g, '').slice(0, 12);
}
const urlToken = new URLSearchParams(window.location.search).get('s') || '';
if (urlToken !== getExpectedToken()) {
  document.getElementById('invalid-screen').style.display = 'flex';
} else {
  document.getElementById('main-header').style.display = 'block';
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('cart-fab').style.display     = 'flex';
  loadProducts();
}

// ─── 商品資料 ───
let allProducts = [];
let cart = [];
let currentProduct = null;
let currentSpecIdx = null;
let currentQty = 1;
let selectedShipping = null;

async function loadProducts() {
  try {
    const snap = await getDocs(query(collection(db, 'products'), where('status', '==', '上架')));
    allProducts = [];
    snap.forEach(d => {
      const p = d.data();
      const ch = p.channel || ['web', 'community'];
      if (!ch.includes('community')) return;
      allProducts.push({ firestoreId: d.id, ...p });
    });
    allProducts.sort((a, b) => {
      const pri = t => t === 'NEW' ? 1 : t === 'HOT' ? 2 : t === 'SALE' ? 3 : 4;
      return pri(a.tag||'') - pri(b.tag||'') || (a.name||'').localeCompare(b.name||'', 'zh-TW');
    });
    renderProducts();
  } catch(e) {
    document.getElementById('product-grid').innerHTML = '<div class="loading-wrap" style="grid-column:1/-1">載入失敗，請重新整理。</div>';
  }
}

function commPrice(v) {
  if (v.communityPrice && String(v.communityPrice).trim()) return parseInt(String(v.communityPrice).replace(/\D/g, '')) || 0;
  if (v.promo && String(v.promo).trim()) return parseInt(String(v.promo).replace(/\D/g, '')) || 0;
  return parseInt(String(v.price || 0).replace(/\D/g, '')) || 0;
}

function hasCommPrice(v) {
  return !!(v.communityPrice && String(v.communityPrice).trim());
}

function renderProducts() {
  const grid = document.getElementById('product-grid');
  if (!allProducts.length) {
    grid.innerHTML = '<div class="loading-wrap" style="grid-column:1/-1">目前尚無社群商品</div>';
    return;
  }
  grid.innerHTML = allProducts.map((p, i) => {
    const img   = (p.images || []).filter(Boolean)[0] || '';
    const vs    = p.variants || [];
    const fv    = vs[0] || {};
    const cp    = commPrice(fv);
    const origP = parseInt(String(fv.price || 0).replace(/\D/g, '')) || 0;
    const ch    = p.channel || ['web','community'];
    const isCommOnly = ch.includes('community') && !ch.includes('web');

    let priceHtml = '';
    if (hasCommPrice(fv) && origP && origP !== cp) {
      priceHtml = `<span class="price-orig">NT$ ${origP.toLocaleString()}</span><span class="price-comm">NT$ ${cp.toLocaleString()}</span>`;
    } else {
      priceHtml = `<span class="price-comm">NT$ ${cp.toLocaleString()}</span>`;
    }

    const tagMap = { NEW:'tag-new', HOT:'tag-hot', SALE:'tag-sale' };
    const tagHtml = p.tag ? `<div><span class="tag-badge ${tagMap[p.tag]||''}">${p.tag}</span></div>` : '';
    const commOnlyHtml = isCommOnly ? '<div><span class="comm-only-tag">社群限定</span></div>' : '';

    return `<div class="product-card" onclick="openProduct(${i})">
      ${img ? `<img src="${img}" alt="" loading="lazy">` : '<div class="no-img">🧴</div>'}
      <div class="info">
        ${tagHtml}${commOnlyHtml}
        <div class="name">${(p.name||'').replace(/<br>/gi,' ')}</div>
        <div class="price-row">${priceHtml}</div>
      </div>
    </div>`;
  }).join('');
}

window.openProduct = function(i) {
  currentProduct = allProducts[i];
  currentSpecIdx = null;
  currentQty     = 1;
  const p  = currentProduct;
  const vs = p.variants || [];
  const img = (p.images || []).filter(Boolean)[0] || '';
  document.getElementById('m-img').src   = img;
  document.getElementById('m-img').style.display = img ? 'block' : 'none';
  document.getElementById('m-name').innerHTML = (p.name||'').replace(/<br>/gi,'<br>');
  document.getElementById('m-desc').innerHTML = (p.desc||'').replace(/<br>/gi,'<br>') || '<span style="color:#bbb">—</span>';
  document.getElementById('m-qty').textContent = 1;

  const specsEl = document.getElementById('m-specs');
  specsEl.innerHTML = vs.map((v, idx) => {
    const cp    = commPrice(v);
    const origP = parseInt(String(v.price || 0).replace(/\D/g, '')) || 0;
    const soldOut = v.stock === 0;
    const priceStr = hasCommPrice(v) && origP !== cp
      ? `<span style="font-size:0.72rem;color:#bbb;text-decoration:line-through;margin-right:4px;">NT$ ${origP.toLocaleString()}</span><span class="spec-price">NT$ ${cp.toLocaleString()}</span>`
      : `<span class="spec-price">NT$ ${cp.toLocaleString()}</span>`;
    return `<button class="spec-btn${soldOut?' sold-out':''}" onclick="selectSpec(${idx})" id="spec-${idx}" ${soldOut?'disabled':''}>
      <span>${v.name||''}${soldOut?' (缺貨)':''}</span>${priceStr}
    </button>`;
  }).join('');

  if (vs.length === 1 && vs[0].stock !== 0) selectSpec(0);

  const addBtn = document.getElementById('m-add-btn');
  addBtn.disabled = currentSpecIdx === null;
  addBtn.textContent = '加入購物車';

  document.getElementById('product-modal').classList.add('open');
};

window.selectSpec = function(idx) {
  currentSpecIdx = idx;
  document.querySelectorAll('.spec-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  const v = (currentProduct.variants || [])[idx] || {};
  const cp = commPrice(v);
  const origP = parseInt(String(v.price||0).replace(/\D/g,'')) || 0;
  const priceBox = document.getElementById('m-price-box');
  if (hasCommPrice(v) && origP && origP !== cp) {
    priceBox.innerHTML = `<span class="label">社群價</span><span class="val">NT$ ${cp.toLocaleString()}</span><span class="orig-val">原 NT$ ${origP.toLocaleString()}</span>`;
  } else {
    priceBox.innerHTML = `<span class="label">價格</span><span class="val">NT$ ${cp.toLocaleString()}</span>`;
  }
  document.getElementById('m-add-btn').disabled = false;
};

window.changeQty = function(d) {
  currentQty = Math.max(1, currentQty + d);
  document.getElementById('m-qty').textContent = currentQty;
};

window.addToCart = function() {
  if (currentSpecIdx === null) return;
  const v = (currentProduct.variants || [])[currentSpecIdx] || {};
  const cp = commPrice(v);
  const existing = cart.find(c => c.firestoreId === currentProduct.firestoreId && c.spec === (v.name||''));
  if (existing) {
    existing.qty += currentQty;
  } else {
    cart.push({
      firestoreId: currentProduct.firestoreId,
      name:  currentProduct.name || '',
      spec:  v.name || '',
      price: cp,
      origPrice: parseInt(String(v.price||0).replace(/\D/g,'')) || cp,
      gift:  v.gift || '',
      qty:   currentQty,
      img:   (currentProduct.images||[]).filter(Boolean)[0] || '',
    });
  }
  updateCartCount();
  closeProductModalBtn();
};

function updateCartCount() {
  const total = cart.reduce((s, c) => s + c.qty, 0);
  document.getElementById('cart-cnt').textContent = total;
}

window.openCart = function() {
  renderCart();
  document.getElementById('cart-modal').classList.add('open');
};

function renderCart() {
  const el = document.getElementById('cart-items');
  if (!cart.length) {
    el.innerHTML = '<div style="text-align:center;padding:30px 0;color:#bbb;font-size:0.88rem;">購物車是空的</div>';
    document.getElementById('cart-total').textContent = 'NT$ 0';
    return;
  }
  el.innerHTML = cart.map((c, i) => `
    <div class="cart-item">
      ${c.img ? `<img src="${c.img}" alt="">` : '<div style="width:56px;height:56px;background:#f5f0eb;border-radius:8px;"></div>'}
      <div class="cart-item-info">
        <div class="cart-item-name">${(c.name||'').replace(/<br>/gi,' ')}</div>
        <div class="cart-item-spec">${c.spec||'單一規格'}${c.gift?' ｜ 贈：'+c.gift:''}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
          <div class="qty-ctrl" style="transform:scale(.85);transform-origin:left">
            <button onclick="cartQty(${i},-1)">－</button>
            <span>${c.qty}</span>
            <button onclick="cartQty(${i},1)">＋</button>
          </div>
          <span class="cart-item-price">NT$ ${(c.price * c.qty).toLocaleString()}</span>
        </div>
      </div>
      <button class="cart-item-rm" onclick="removeCart(${i})">✕</button>
    </div>`).join('');
  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  document.getElementById('cart-total').textContent = 'NT$ ' + total.toLocaleString();
}

window.cartQty = function(i, d) {
  cart[i].qty = Math.max(1, cart[i].qty + d);
  renderCart();
  updateCartCount();
};
window.removeCart = function(i) {
  cart.splice(i, 1);
  renderCart();
  updateCartCount();
};

window.selectShipping = function(btn, val) {
  selectedShipping = val;
  document.querySelectorAll('.shipping-opt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
};

window.checkout = async function() {
  if (!cart.length) return;
  if (!selectedShipping) { alert('請選擇下單平台'); return; }
  const btn = document.getElementById('checkout-btn');
  btn.disabled = true; btn.textContent = '處理中，請稍候…';
  try {
    const orderId = 'C' + Date.now().toString(36).toUpperCase().slice(-6);
    let total = cart.reduce((s, c) => s + c.price * c.qty, 0);

    await addDoc(collection(db, 'orders'), {
      orderId,
      status:    '待確認',
      source:    'community',
      cart:      cart.map(c => ({ ...c })),
      total,
      shipping:  selectedShipping,
      createdAt: serverTimestamp(),
    });

    const now     = new Date();
    const dateStr = `${now.getMonth()+1}月${now.getDate()}日`;
    let msg = `【社群訂單：${orderId}】\n您好，這是我的社群訂購清單 (${dateStr})：\n\n`;
    cart.forEach((c, idx) => {
      const cleanName = (c.name||'').replace(/<br\s*\/?>/gi,' ');
      msg += `[${String(idx+1).padStart(2,'0')}] ${cleanName}\n`;
      msg += `- 規格: ${c.spec||'單一規格'}${c.gift?` (贈: ${c.gift})`:''}\n`;
      msg += `- 數量: ${c.qty} (NT$ ${c.price})\n\n`;
    });
    msg += `-------------\n總金額: NT$ ${total}\n平台: ${selectedShipping}`;

    const lineUrl  = `https://line.me/R/oaMessage/@139gqqwy/?${encodeURIComponent(msg)}`;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (isMobile) {
      window.location.href = lineUrl;
    } else {
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(lineUrl)}`;
      document.getElementById('qr-body').innerHTML = `
        <p>訂單已建立：<strong>${orderId}</strong><br>拿起手機掃描 QR Code 完成下單</p>
        <img src="${qrUrl}" alt="QR">`;
      document.getElementById('cart-modal').classList.remove('open');
      document.getElementById('qr-modal').classList.add('open');
    }
    cart = []; updateCartCount();
  } catch(e) {
    alert('結帳失敗：' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.630 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.630 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>傳送至 LINE 官方帳號`;
  }
};

window.closeProductModal = function(e) { if (e.target.id === 'product-modal') closeProductModalBtn(); };
window.closeProductModalBtn = function() { document.getElementById('product-modal').classList.remove('open'); };
window.closeCartModal = function(e) { if (e.target.id === 'cart-modal') document.getElementById('cart-modal').classList.remove('open'); };
window.closeQrModal   = function(e) { if (e.target.id === 'qr-modal')   document.getElementById('qr-modal').classList.remove('open'); };
</script>
</body>
</html>
