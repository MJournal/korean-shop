<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>訂單查詢 | Mina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background-color: #fdfbf7;
      background-image:
        radial-gradient(at 40% 20%, rgba(212,163,115,0.18) 0px, transparent 50%),
        radial-gradient(at 80% 0%,  rgba(181,131,141,0.12) 0px, transparent 50%),
        radial-gradient(at 0%  50%, rgba(229,152,155,0.10) 0px, transparent 50%);
      background-attachment: fixed;
      color: #1a1510;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
    }

    /* ── Paper ── */
    .paper {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 3px;
      box-shadow:
        0 2px 8px rgba(160,120,80,0.10),
        0 12px 40px rgba(160,120,80,0.09);
      overflow: hidden;
    }

    /* ── Search section ── */
    .search-section {
      padding: 28px 28px 22px;
      border-bottom: 1px solid #ede5db;
    }
    .brand-heading {
      font-family: "Cormorant Garamond", serif;
      font-size: 2.2rem;
      font-weight: 600;
      font-style: italic;
      color: #2a2520;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 2px;
    }
    .brand-sub {
      text-align: center;
      font-size: 0.62rem;
      letter-spacing: 5px;
      color: #b8a898;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .search-label {
      font-size: 0.68rem;
      font-weight: 500;
      color: #9a8878;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 7px;
      display: block;
    }
    .search-row { display: flex; gap: 8px; }
    .search-input {
      flex: 1;
      padding: 10px 13px;
      border: 1px solid #ddd3c8;
      border-radius: 3px;
      font-size: 0.88rem;
      font-family: inherit;
      color: #1a1510;
      background: #fdfbf7;
      outline: none;
      transition: border-color 0.15s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .search-input::placeholder { color: #c8b8a8; letter-spacing: 0; text-transform: none; }
    .search-input:focus { border-color: #c8a882; }
    .btn-search {
      padding: 10px 18px;
      background: #b07352;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 500;
      letter-spacing: 1.5px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-search:hover { background: #8a5a3e; }
    .btn-search:disabled { background: #d0bfb0; cursor: not-allowed; }

    .hint {
      margin-top: 12px;
      font-size: 0.7rem;
      color: #b8a898;
      line-height: 1.7;
      text-align: center;
    }
    .hint strong { color: #9a8878; }

    .error-msg {
      margin-top: 12px;
      padding: 9px 12px;
      background: #fdeaea;
      border-radius: 3px;
      color: #c97c7c;
      font-size: 0.75rem;
      display: none;
    }

    /* ── Loading / Empty ── */
    .spinner {
      display: none;
      margin: 32px auto;
      width: 28px; height: 28px;
      border: 2px solid #ede5db;
      border-top-color: #c8a882;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-msg {
      padding: 36px 28px;
      text-align: center;
      color: #b8a898;
      font-size: 0.82rem;
    }
    .state-msg .icon { font-size: 1.8rem; margin-bottom: 10px; }

    /* ── Receipt area ── */
    .receipt-area { display: none; }

    /* Customer name row */
    .rcpt-customer-row {
      padding: 20px 28px 0;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .rcpt-customer-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: #2a2520;
      letter-spacing: 1px;
    }
    .rcpt-customer-label {
      font-size: 0.65rem;
      color: #c8b8a8;
      letter-spacing: 1px;
    }

    /* ── Overall Status Banner ── */
    .status-banner {
      margin: 16px 28px 0;
      border-radius: 6px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-left: 4px solid;
    }
    .status-banner-icon { font-size: 1.6rem; flex-shrink: 0; line-height: 1; }
    .status-banner-body { flex: 1; min-width: 0; }
    .status-banner-label {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      line-height: 1.2;
      margin-bottom: 3px;
    }
    .status-banner-desc {
      font-size: 0.72rem;
      line-height: 1.5;
      opacity: 0.8;
    }

    /* Status color variants */
    .sbn-waiting {
      background: #fef8ec; border-color: #e0b84a;
      color: #8a6820;
    }
    .sbn-buying {
      background: #fdf0e8; border-color: #c8845a;
      color: #7a4828;
    }
    .sbn-arrived {
      background: #eaf1f9; border-color: #6090be;
      color: #2a4e72;
    }
    .sbn-shipped {
      background: #f2eefa; border-color: #9878b8;
      color: #5a3878;
    }
    .sbn-pending {
      background: #f4f0ec; border-color: #b8a898;
      color: #6a5848;
    }
    .sbn-cancel {
      background: #fdeaea; border-color: #d08080;
      color: #8a3838;
    }
    .sbn-new {
      background: #eef7ee; border-color: #7ab87a;
      color: #2e6e2e;
    }

    /* ── Section divider ── */
    .rcpt-section-label {
      padding: 20px 28px 8px;
      font-size: 0.62rem;
      letter-spacing: 3px;
      color: #c8b8a8;
      text-transform: uppercase;
    }
    .rcpt-divider { border: none; border-top: 1px solid #ede5db; margin: 0 28px; }
    .rcpt-divider-dash { border: none; border-top: 1px dashed #ede5db; margin: 0 28px; }

    /* ── Items ── */
    .rcpt-items { padding: 0 28px 4px; }

    .rcpt-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px 0;
    }

    .rcpt-item-img {
      width: 72px; height: 72px;
      object-fit: contain;
      border-radius: 6px;
      flex-shrink: 0;
      background: #f8f5f0;
      border: 1px solid #e8ddd4;
      display: block;
    }
    .rcpt-item-img-placeholder {
      width: 72px; height: 72px;
      border-radius: 6px;
      flex-shrink: 0;
      background: #f5f0eb;
      border: 1px dashed #d8c8b8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #d0bfb0;
    }

    .rcpt-item-content { flex: 1; min-width: 0; }
    .rcpt-item-name {
      font-weight: 500;
      font-size: 0.88rem;
      color: #1a1510;
      line-height: 1.4;
      margin-bottom: 3px;
    }
    .rcpt-item-spec {
      display: inline-block;
      background: #f0ebe3;
      color: #7a6050;
      font-size: 0.66rem;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .rcpt-item-gift {
      display: inline-block;
      background: #fdf0e8;
      color: #a06020;
      font-size: 0.66rem;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
      margin-left: 4px;
    }
    .rcpt-item-price {
      font-size: 0.75rem;
      color: #a09080;
    }

    /* Per-item status — prominent pill */
    .item-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      margin-top: 6px;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .ist-waiting {
      background: #fef8ec; color: #9a7020;
      border-color: #e0c878;
    }
    .ist-buying {
      background: #fdf0e8; color: #904830;
      border-color: #d09878;
    }
    .ist-arrived {
      background: #eaf1f9; color: #2a5080;
      border-color: #80a8d0;
    }
    .ist-shipped {
      background: #f2eefa; color: #5a3080;
      border-color: #a080c8;
    }
    .ist-cancel {
      background: #fdeaea; color: #883030;
      border-color: #d09090;
    }

    /* ── Note ── */
    .rcpt-note {
      margin: 0 28px 16px;
      padding: 10px 12px;
      background: #fdf6f0;
      border-radius: 4px;
      font-size: 0.72rem;
      color: #9a8878;
      line-height: 1.6;
    }

    /* ── Footer ── */
    .rcpt-footer {
      text-align: center;
      font-size: 0.58rem;
      letter-spacing: 4px;
      color: #d8c8b8;
      padding: 20px 28px 24px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="paper">

  <!-- Search -->
  <div class="search-section">
    <div class="brand-heading">Mina</div>
    <div class="brand-sub">妝日子 · Order Status</div>
    <label class="search-label">Order Number</label>
    <div class="search-row">
      <input type="text" class="search-input" id="order-input"
        placeholder="ORD-XXXXXXXX"
        autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn-search" id="btn-search">查詢</button>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <div id="hint" class="hint">
      訂單編號格式範例：<strong>ORD-20240501-001</strong><br>
      如有任何問題，歡迎直接傳訊息給我們 ☺
    </div>
  </div>

  <div class="spinner" id="spinner"></div>

  <div class="state-msg" id="empty-state" style="display:none">
    <div class="icon">🔍</div>
    <p>找不到此訂單編號<br><span style="font-size:0.72rem;color:#c8b8a8">請確認編號是否正確，或聯絡客服</span></p>
  </div>

  <!-- Receipt -->
  <div class="receipt-area" id="receipt-area">

    <!-- Customer name -->
    <div class="rcpt-customer-row">
      <span class="rcpt-customer-name" id="r-customer"></span>
      <span class="rcpt-customer-label">的訂單</span>
    </div>

    <!-- Overall status banner -->
    <div class="status-banner" id="r-status-banner">
      <div class="status-banner-icon" id="r-status-icon"></div>
      <div class="status-banner-body">
        <div class="status-banner-label" id="r-status-label"></div>
        <div class="status-banner-desc" id="r-status-desc"></div>
      </div>
    </div>

    <!-- Items -->
    <div class="rcpt-section-label">商品明細</div>
    <hr class="rcpt-divider">
    <div class="rcpt-items" id="r-items"></div>
    <hr class="rcpt-divider">

    <!-- Note -->
    <div id="r-note"></div>

  </div>

  <div class="rcpt-footer">Thank you for your order</div>

</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import {
    getFirestore, collection, query, where, getDocs, limit
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAWWzDwfnPcPYXP7-yi10iQPq_wriZNUJg",
    authDomain: "minashop-c089a.firebaseapp.com",
    projectId: "minashop-c089a",
    storageBucket: "minashop-c089a.firebasestorage.app",
    messagingSenderId: "201093013608",
    appId: "1:201093013608:web:8b4e6b0f5506ca437fdbdd"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  let allProducts = null;

  async function getProducts() {
    if (allProducts) return allProducts;
    try {
      const snap = await getDocs(collection(db, 'products'));
      allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) { allProducts = []; }
    return allProducts;
  }

  function findProductImage(item, products) {
    // 優先：後台手動上傳的圖片（已存進 Firebase Storage）
    if (item.imageUrl) return item.imageUrl;
    if (!products || !products.length) return null;
    // 次：用 productId 比對商品庫
    if (item.productId) {
      const p = products.find(p => p.id === item.productId);
      if (p) return (p.images || []).find(Boolean) || null;
    }
    // 末：用商品名模糊比對
    const n = (item.name || '').replace(/<br>/gi, ' ').trim().toLowerCase();
    if (!n) return null;
    const p = products.find(p => {
      const pn = (p.name || '').replace(/<br>/gi, ' ').trim().toLowerCase();
      return pn === n || n.includes(pn) || pn.includes(n);
    });
    return p ? (p.images || []).find(Boolean) || null : null;
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Status configs: icon, label, desc, banner class
  const STATUS_CONFIG = {
    ordered:  { icon: '🎉', label: '訂單成立',  desc: '訂單已收到！我們將盡快確認並安排採購。',    cls: 'sbn-new' },
    waiting:  { icon: '🕐', label: '待確認',   desc: '等待定金匯款⋯確認後將安排採購。',          cls: 'sbn-waiting' },
    buying:   { icon: '🛍️', label: '採購中',   desc: '商品採購中⋯請耐心等候',                   cls: 'sbn-buying' },
    arrived:  { icon: '✅', label: '採購完成', desc: '已順利採購到貨，正在整理並安排出貨事宜',   cls: 'sbn-arrived' },
    shipped:  { icon: '📦', label: '已出貨',   desc: '包裹已經寄出，再麻煩留意簡訊通知～',       cls: 'sbn-shipped' },
    pending:  { icon: '🕐', label: '待確認',   desc: '等待定金匯款⋯確認後將安排採購。',          cls: 'sbn-waiting' },
    cancel:   { icon: '✕',  label: '訂單已取消', desc: '此訂單已取消，如有疑問請聯絡我們',       cls: 'sbn-cancel' },
  };

  function getStatusKey(o) {
    if (o.status === '已取消') return 'cancel';
    // 網站下單、尚未後台確認
    if (o.status === '待確認') return 'ordered';
    if (o.fulfillmentStatus === '已出貨')   return 'shipped';
    if (o.fulfillmentStatus === '全數到貨') return 'arrived';

    const cart = o.confirmedCart || o.cart || [];
    const cf   = o.cartFulfillment || [];
    const allDone = cart.length > 0 && cf.length >= cart.length && cart.every((_, i) => cf[i] && (cf[i].bought || cf[i].arrived));
    if (allDone) return 'arrived';

    // 後台手動設定採購中，或有任何商品已採購/到貨
    if (o.fulfillmentStatus === '採購中') return 'buying';
    const anyBought = cf.some(function(item){ return item.bought || item.arrived; });
    if (anyBought) return 'buying';
    return 'waiting';
  }

  function getItemStatus(cfItem, orderShipped, orderBuying) {
    if (orderShipped) return { cls: 'ist-shipped', label: '📦 已出貨' };
    if (cfItem && (cfItem.bought || cfItem.arrived)) return { cls: 'ist-arrived', label: '✅ 採購完成' };
    if (orderBuying) return { cls: 'ist-buying', label: '🛍️ 採購中' };
    return { cls: 'ist-waiting', label: '🕐 待確認' };
  }

  async function renderReceipt(o) {
    const products    = await getProducts();
    const cart        = o.confirmedCart || o.cart || [];
    const cf          = o.cartFulfillment || cart.map(() => ({ bought: false, arrived: false }));
    const isShipped   = (o.fulfillmentStatus === '已出貨');
    const isCancelled = (o.status === '已取消');
    const statusKey   = getStatusKey(o);
    const cfg         = STATUS_CONFIG[statusKey];

    // Customer name
    document.getElementById('r-customer').textContent = o.customerName || '您';

    // Status banner
    const banner = document.getElementById('r-status-banner');
    banner.className = `status-banner ${cfg.cls}`;
    document.getElementById('r-status-icon').textContent  = cfg.icon;
    document.getElementById('r-status-label').textContent = cfg.label;
    document.getElementById('r-status-desc').textContent  = cfg.desc;

    // Items
    const sortedItems = cart
      .map((it, idx) => ({ it, cfItem: cf[idx] || {}, idx }))
      .sort((a, b) =>
        (a.it.name||'').replace(/<br>/gi,' ')
          .localeCompare((b.it.name||'').replace(/<br>/gi,' '), 'zh-TW')
      );


    document.getElementById('r-items').innerHTML = sortedItems.map(({ it, cfItem }, i) => {
      const qty   = Number(it.qty) || 1;
      const st    = isCancelled
        ? { cls: 'ist-cancel', label: '✕ 已取消' }
        : getItemStatus(cfItem, isShipped, statusKey === 'buying');

      const imgUrl = findProductImage(it, products);
      const imgHtml = imgUrl
        ? `<img class="rcpt-item-img" src="${imgUrl}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const placeholder = `<div class="rcpt-item-img-placeholder" style="${imgUrl ? 'display:none' : ''}">✦</div>`;

      const specHtml = (it.spec && it.spec !== '單一規格')
        ? `<span class="rcpt-item-spec">${esc(it.spec)}</span>` : '';
      const giftHtml = it.gift
        ? `<span class="rcpt-item-gift">贈：${esc(it.gift)}</span>` : '';
      const divider  = i < sortedItems.length - 1 ? '<hr class="rcpt-divider-dash">' : '';

      return `<div class="rcpt-item">
        ${imgHtml}${placeholder}
        <div class="rcpt-item-content">
          <div class="rcpt-item-name">${esc((it.name||'').replace(/<br>/gi,' '))}</div>
          <div>${specHtml}${giftHtml}</div>
          <div class="rcpt-item-price">NT$${Number(it.price||0).toLocaleString()} × ${qty}</div>
          <span class="item-status ${st.cls}">${st.label}</span>
        </div>
      </div>${divider}`;
    }).join('');

    // Note
    document.getElementById('r-note').innerHTML = o.note
      ? `<div class="rcpt-note">📝 ${esc(o.note)}</div>` : '';

    document.getElementById('receipt-area').style.display = 'block';
  }

  async function doSearch() {
    const raw = document.getElementById('order-input').value.trim().toUpperCase();
    if (!raw) return;

    document.getElementById('receipt-area').style.display = 'none';
    document.getElementById('empty-state').style.display  = 'none';
    document.getElementById('error-msg').style.display    = 'none';
    document.getElementById('hint').style.display         = 'none';
    document.getElementById('spinner').style.display      = 'block';
    document.getElementById('btn-search').disabled        = true;

    try {
      const q    = query(collection(db,'orders'), where('orderId','==',raw), limit(1));
      const snap = await getDocs(q);

      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btn-search').disabled   = false;

      if (snap.empty) {
        document.getElementById('empty-state').style.display = 'block';
      } else {
        await renderReceipt({ id: snap.docs[0].id, ...snap.docs[0].data() });
      }
    } catch(e) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btn-search').disabled   = false;
      const em = document.getElementById('error-msg');
      em.textContent = '查詢失敗，請稍後再試。';
      em.style.display = 'block';
      console.error(e);
    }
  }

  const input = document.getElementById('order-input');
