<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>訂單查詢 | Mina</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:       #2a7c5f;
      --green-dark:  #1b4d38;
      --green-light: #d4ead9;
      --green-mid:   #52b788;
      --page-bg:     #f0f5f2;
      --card-bg:     #ffffff;
      --text:        #1a2e25;
      --text-sub:    #5a7a6a;
      --border:      #d0e4d8;
      --danger:      #e05c5c;
      --warning:     #d4a017;
      --warning-bg:  #fef8e3;
      --blue:        #1565c0;
      --blue-bg:     #e3f2fd;
      --purple:      #7b2d8b;
      --purple-bg:   #f3e8ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background: var(--page-bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 32px;
    }

    /* ── Header ── */
    .header {
      background: var(--green);
      padding: 20px 20px 24px;
      text-align: center;
    }
    .header h1 {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .header p {
      color: rgba(255,255,255,0.65);
      font-size: 0.75rem;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* ── Search Box ── */
    .search-wrap {
      background: var(--card-bg);
      margin: 0 16px;
      margin-top: -12px;
      border-radius: 12px;
      padding: 20px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
    }
    .search-label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-sub);
      margin-bottom: 8px;
      display: block;
    }
    .search-row {
      display: flex;
      gap: 8px;
    }
    .search-input {
      flex: 1;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .search-input::placeholder { color: #aac2b5; letter-spacing: 0; text-transform: none; }
    .search-input:focus { border-color: var(--green-mid); }
    .btn-search {
      padding: 11px 20px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-search:hover { background: var(--green-dark); }
    .btn-search:disabled { background: #a5c8b8; cursor: not-allowed; }

    /* ── States ── */
    .state-msg {
      margin: 32px 16px 0;
      text-align: center;
      color: var(--text-sub);
      font-size: 0.85rem;
    }
    .state-msg .icon { font-size: 2rem; margin-bottom: 8px; }

    .error-msg {
      margin: 16px 16px 0;
      padding: 12px 14px;
      background: #fde8e8;
      border-radius: 8px;
      color: var(--danger);
      font-size: 0.82rem;
      display: none;
    }

    /* ── Receipt Card ── */
    .receipt-card {
      margin: 16px 16px 0;
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      display: none;
    }

    .rcpt-header {
      background: var(--green);
      padding: 16px 20px;
      color: #fff;
    }
    .rcpt-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .rcpt-order-id {
      font-size: 0.78rem;
      opacity: 0.75;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .rcpt-customer {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .rcpt-date {
      font-size: 0.72rem;
      opacity: 0.65;
      margin-top: 4px;
    }

    /* Overall status badge */
    .order-status-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .status-waiting  { background: rgba(255,255,255,0.2); color: #fff; }
    .status-buying   { background: rgba(255,255,255,0.2); color: #fff; }
    .status-arrived  { background: rgba(255,255,255,0.2); color: #fff; }
    .status-shipped  { background: rgba(255,255,255,0.85); color: var(--green-dark); }
    .status-pending  { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); }
    .status-cancel   { background: rgba(255,100,100,0.3); color: #fff; }

    /* ── Items ── */
    .rcpt-items { padding: 4px 0; }

    .rcpt-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .rcpt-item:last-child { border-bottom: none; }

    .rcpt-item-icon {
      font-size: 1.2rem;
      margin-top: 1px;
      flex-shrink: 0;
    }
    .rcpt-item-body { flex: 1; min-width: 0; }
    .rcpt-item-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }
    .rcpt-item-spec {
      font-size: 0.75rem;
      color: var(--text-sub);
      margin-top: 2px;
    }
    .rcpt-item-gift {
      font-size: 0.72rem;
      color: #a06020;
      background: #fdf0e8;
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      margin-top: 3px;
    }
    .rcpt-item-right {
      text-align: right;
      flex-shrink: 0;
    }
    .rcpt-item-price {
      font-size: 0.82rem;
      color: var(--text-sub);
      white-space: nowrap;
    }

    /* Per-item status pill */
    .item-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 600;
      margin-top: 5px;
      white-space: nowrap;
    }
    .ist-waiting  { background: var(--warning-bg);  color: var(--warning); }
    .ist-buying   { background: #fff8e6;            color: #a06800; }
    .ist-arrived  { background: var(--blue-bg);     color: var(--blue); }
    .ist-shipped  { background: var(--purple-bg);   color: var(--purple); }
    .ist-cancel   { background: #fde8e8;            color: var(--danger); }

    /* ── Summary ── */
    .rcpt-summary {
      padding: 14px 16px;
      background: #f8fcf9;
      border-top: 1px solid var(--border);
    }
    .rcpt-sum-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--text-sub);
      margin-bottom: 5px;
    }
    .rcpt-sum-row:last-child { margin-bottom: 0; }
    .rcpt-sum-row.total {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--green-dark);
      border-top: 1px dashed var(--border);
      padding-top: 9px;
      margin-top: 9px;
    }
    .rcpt-note {
      margin-top: 10px;
      padding: 8px 10px;
      background: var(--green-light);
      border-radius: 6px;
      font-size: 0.75rem;
      color: var(--text-sub);
    }

    /* ── Hint ── */
    .hint {
      margin: 16px 16px 0;
      padding: 12px 14px;
      background: var(--green-light);
      border-radius: 8px;
      font-size: 0.75rem;
      color: var(--text-sub);
      line-height: 1.6;
    }

    /* ── Loading ── */
    .spinner {
      display: none;
      margin: 32px auto 0;
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <h1>訂單查詢</h1>
  <p>MINA · ORDER STATUS</p>
</div>

<div class="search-wrap">
  <label class="search-label">請輸入您的訂單編號</label>
  <div class="search-row">
    <input type="text" class="search-input" id="order-input"
      placeholder="ORD-XXXXXXXX"
      autocomplete="off" autocorrect="off" spellcheck="false"
      oninput="this.value=this.value.toUpperCase()"
      onkeydown="if(event.key==='Enter')doSearch()">
    <button class="btn-search" id="btn-search" onclick="doSearch()">查詢</button>
  </div>
</div>

<div class="error-msg" id="error-msg"></div>
<div class="spinner" id="spinner"></div>

<div id="hint" class="hint">
  訂單編號格式範例：<strong>ORD-20240501-001</strong><br>
  如有任何問題，歡迎直接傳訊息給我們 ☺
</div>

<div class="state-msg" id="empty-state" style="display:none">
  <div class="icon">🔍</div>
  <p>找不到此訂單編號<br><span style="font-size:0.75rem">請確認編號是否正確，或聯絡客服</span></p>
</div>

<!-- Receipt -->
<div class="receipt-card" id="receipt-card">
  <div class="rcpt-header">
    <div class="rcpt-header-row">
      <div>
        <div class="rcpt-order-id" id="r-order-id"></div>
        <div class="rcpt-customer" id="r-customer"></div>
        <div class="rcpt-date" id="r-date"></div>
      </div>
      <span class="order-status-badge" id="r-order-status"></span>
    </div>
  </div>
  <div class="rcpt-items" id="r-items"></div>
  <div class="rcpt-summary" id="r-summary"></div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import {
    getFirestore, collection, query, where, getDocs, limit
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAWWzDwfnPcPYXP7-yi10iQPq_wriZNUJg",
    authDomain: "minashop-c089a.firebaseapp.com",
    projectId: "minashop-c089a",
    storageBucket: "minashop-c089a.firebasestorage.app",
    messagingSenderId: "201093013608",
    appId: "1:201093013608:web:8b4e6b0f5506ca437fdbdd"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── Helpers ──
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function fmtDate(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }
  function fmtMoney(n) {
    return `NT$${Number(n||0).toLocaleString()}`;
  }

  // ── Item status per cartFulfillment ──
  function getItemStatus(cfItem, orderShipped) {
    if (orderShipped) return { cls: 'ist-shipped', label: '📦 已出貨' };
    if (!cfItem || (!cfItem.bought && !cfItem.arrived)) return { cls: 'ist-waiting', label: '⏳ 備貨中' };
    if (cfItem.arrived) return { cls: 'ist-arrived', label: '✅ 已備妥' };
    if (cfItem.bought)  return { cls: 'ist-buying',  label: '🚚 採購中' };
    return { cls: 'ist-waiting', label: '⏳ 備貨中' };
  }

  // ── Order overall status ──
  function getOrderBadge(o) {
    if (o.status === '已取消') return { cls: 'status-cancel', label: '已取消' };
    if (o.status === '待確認') return { cls: 'status-pending', label: '待確認' };
    const fs = o.fulfillmentStatus || '待採購';
    const map = {
      '待採購':  { cls: 'status-waiting', label: '備貨中' },
      '等待出貨':{ cls: 'status-buying',  label: '採購中' },
      '全數到貨':{ cls: 'status-arrived', label: '已備妥' },
      '已出貨':  { cls: 'status-shipped', label: '已出貨' },
    };
    return map[fs] || { cls: 'status-waiting', label: fs };
  }

  // ── Render receipt ──
  function renderReceipt(o) {
    const cart = o.confirmedCart || o.cart || [];
    const cf   = o.cartFulfillment || cart.map(() => ({ bought: false, arrived: false }));
    const isShipped = (o.fulfillmentStatus === '已出貨');
    const isCancelled = (o.status === '已取消');

    const badge = getOrderBadge(o);
    document.getElementById('r-order-id').textContent  = o.orderId || '';
    document.getElementById('r-customer').textContent  = o.customerName || '訂單詳情';
    document.getElementById('r-date').textContent      = '下單日期：' + fmtDate(o.confirmedAt || o.createdAt);
    const statusEl = document.getElementById('r-order-status');
    statusEl.className = 'order-status-badge ' + badge.cls;
    statusEl.textContent = badge.label;

    // Sort items alphabetically (same as admin)
    const sortedItems = cart
      .map((it, idx) => ({ it, cfItem: cf[idx] || {}, idx }))
      .sort((a, b) =>
        (a.it.name||'').replace(/<br>/gi,' ')
          .localeCompare((b.it.name||'').replace(/<br>/gi,' '), 'zh-TW')
      );

    document.getElementById('r-items').innerHTML = sortedItems.map(({ it, cfItem }) => {
      const qty = Number(it.qty) || 1;
      const sub = (Number(it.price) || 0) * qty;
      const st  = isCancelled
        ? { cls: 'ist-cancel', label: '已取消' }
        : getItemStatus(cfItem, isShipped);
      const specHtml = (it.spec && it.spec !== '單一規格')
        ? `<div class="rcpt-item-spec">${esc(it.spec)}</div>` : '';
      const giftHtml = it.gift
        ? `<div class="rcpt-item-gift">贈：${esc(it.gift)}</div>` : '';
      return `<div class="rcpt-item">
        <div class="rcpt-item-body">
          <div class="rcpt-item-name">${esc((it.name||'').replace(/<br>/gi,' '))}</div>
          ${specHtml}${giftHtml}
        </div>
        <div class="rcpt-item-right">
          <div class="rcpt-item-price">${fmtMoney(it.price)} × ${qty}</div>
          <span class="item-status ${st.cls}">${st.label}</span>
        </div>
      </div>`;
    }).join('');

    // Summary
    const subtotal = cart.reduce((s, i) => s + (Number(i.price)||0) * (Number(i.qty)||1), 0);
    const deposit  = Number(o.confirmedDeposit ?? o.deposit ?? 0);
    const discount = Number(o.discount || 0);
    const total    = Number(o.confirmedTotal ?? o.total ?? subtotal);
    let sumHtml = '';
    if (discount > 0)
      sumHtml += `<div class="rcpt-sum-row"><span>折扣</span><span>-${fmtMoney(discount)}</span></div>`;
    if (deposit > 0)
      sumHtml += `<div class="rcpt-sum-row"><span>已付定金</span><span>-${fmtMoney(deposit)}</span></div>`;
    sumHtml += `<div class="rcpt-sum-row total"><span>總金額</span><span>${fmtMoney(total)}</span></div>`;
    if (deposit > 0) {
      const balance = Math.max(0, total - deposit);
      sumHtml += `<div class="rcpt-sum-row" style="font-size:0.78rem;color:var(--text-sub)"><span>尾款</span><span>${fmtMoney(balance)}</span></div>`;
    }
    if (o.note)
      sumHtml += `<div class="rcpt-note">📝 ${esc(o.note)}</div>`;

    document.getElementById('r-summary').innerHTML = sumHtml;
    document.getElementById('receipt-card').style.display = 'block';
  }

  // ── Search ──
  window.doSearch = async function() {
    const raw = document.getElementById('order-input').value.trim().toUpperCase();
    if (!raw) return;

    // reset
    document.getElementById('receipt-card').style.display = 'none';
    document.getElementById('empty-state').style.display  = 'none';
    document.getElementById('error-msg').style.display    = 'none';
    document.getElementById('hint').style.display         = 'none';
    document.getElementById('spinner').style.display      = 'block';
    document.getElementById('btn-search').disabled        = true;

    try {
      const q    = query(collection(db,'orders'), where('orderId','==',raw), limit(1));
      const snap = await getDocs(q);

      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btn-search').disabled   = false;

      if (snap.empty) {
        document.getElementById('empty-state').style.display = 'block';
      } else {
        const o = { id: snap.docs[0].id, ...snap.docs[0].data() };
        renderReceipt(o);
      }
    } catch(e) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btn-search').disabled   = false;
      const em = document.getElementById('error-msg');
      em.textContent = '查詢失敗，請稍後再試。';
      em.style.display = 'block';
      console.error(e);
    }
  };
</script>

</body>
</html>
