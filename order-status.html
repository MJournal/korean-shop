<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>訂單查詢 | Mina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background-color: #fdfbf7;
      background-image:
        radial-gradient(at 40% 20%, rgba(212,163,115,0.18) 0px, transparent 50%),
        radial-gradient(at 80% 0%,  rgba(181,131,141,0.12) 0px, transparent 50%),
        radial-gradient(at 0%  50%, rgba(229,152,155,0.10) 0px, transparent 50%);
      background-attachment: fixed;
      color: #1a1510;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
    }

    /* ── A5 Paper ── */
    .paper {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 3px;
      box-shadow:
        0 2px 8px rgba(160,120,80,0.10),
        0 12px 40px rgba(160,120,80,0.09);
    }

    /* ── Search section (top, outside receipt area) ── */
    .search-section {
      padding: 28px 28px 22px;
      border-bottom: 1px solid #ede5db;
    }
    .brand-heading {
      font-family: "Cormorant Garamond", serif;
      font-size: 2.2rem;
      font-weight: 600;
      font-style: italic;
      color: #2a2520;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 2px;
    }
    .brand-sub {
      text-align: center;
      font-size: 0.62rem;
      letter-spacing: 5px;
      color: #b8a898;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .search-label {
      font-size: 0.68rem;
      font-weight: 500;
      color: #9a8878;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 7px;
      display: block;
    }
    .search-row {
      display: flex;
      gap: 8px;
    }
    .search-input {
      flex: 1;
      padding: 10px 13px;
      border: 1px solid #ddd3c8;
      border-radius: 3px;
      font-size: 0.88rem;
      font-family: inherit;
      color: #1a1510;
      background: #fdfbf7;
      outline: none;
      transition: border-color 0.15s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .search-input::placeholder { color: #c8b8a8; letter-spacing: 0; text-transform: none; }
    .search-input:focus { border-color: #c8a882; }
    .btn-search {
      padding: 10px 18px;
      background: #b07352;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 500;
      letter-spacing: 1.5px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-search:hover { background: #8a5a3e; }
    .btn-search:disabled { background: #d0bfb0; cursor: not-allowed; }

    /* ── Hint ── */
    .hint {
      margin-top: 12px;
      font-size: 0.7rem;
      color: #b8a898;
      line-height: 1.7;
      text-align: center;
    }
    .hint strong { color: #9a8878; }

    /* ── States ── */
    .state-msg {
      padding: 36px 28px;
      text-align: center;
      color: #b8a898;
      font-size: 0.82rem;
    }
    .state-msg .icon { font-size: 1.8rem; margin-bottom: 10px; }

    .error-msg {
      margin: 12px 28px 0;
      padding: 9px 12px;
      background: #fdeaea;
      border-radius: 3px;
      color: #c97c7c;
      font-size: 0.75rem;
      display: none;
    }

    /* ── Loading ── */
    .spinner {
      display: none;
      margin: 32px auto;
      width: 28px; height: 28px;
      border: 2px solid #ede5db;
      border-top-color: #c8a882;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Receipt area ── */
    .receipt-area {
      display: none;
      padding: 28px 28px 0;
    }

    /* Receipt header */
    .rcpt-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 2rem;
      font-style: italic;
      font-weight: 600;
      letter-spacing: 6px;
      color: #2a2520;
      text-align: center;
      margin-bottom: 4px;
    }
    .rcpt-date-line {
      text-align: center;
      font-size: 0.66rem;
      letter-spacing: 3px;
      color: #a08878;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .rcpt-orderid-line {
      text-align: center;
      font-size: 0.66rem;
      letter-spacing: 2px;
      color: #c0aba0;
      margin-bottom: 6px;
    }
    .rcpt-customer-line {
      text-align: center;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: #3a2e28;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    /* Overall status */
    .rcpt-status-bar {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }
    .order-status-badge {
      padding: 4px 14px;
      border-radius: 2px;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 2px;
      border: 1px solid currentColor;
    }
    .status-waiting  { color: #c8a24a; background: #fef8ec; }
    .status-buying   { color: #b07352; background: #fdf0e8; }
    .status-arrived  { color: #5b7fa6; background: #eaf1f9; }
    .status-shipped  { color: #7a5a8a; background: #f5eefa; }
    .status-pending  { color: #9a8878; background: #f4f0ec; }
    .status-cancel   { color: #c97c7c; background: #fdeaea; }

    .rcpt-divider { border: none; border-top: 1px solid #c8a882; margin: 0; }
    .rcpt-divider-dash { border: none; border-top: 1px dashed #e0d0c0; margin: 0; }

    /* ── Items ── */
    .rcpt-items { padding: 4px 0; }

    .rcpt-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px 0;
    }

    .rcpt-item-img {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      background: #f0ebe3;
      border: 1px solid #e8ddd4;
      display: block;
    }
    .rcpt-item-img-placeholder {
      width: 52px;
      height: 52px;
      border-radius: 6px;
      flex-shrink: 0;
      background: #f0ebe3;
      border: 1px dashed #c8a882;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #d0bfb0;
    }

    .rcpt-item-content { flex: 1; min-width: 0; }
    .rcpt-item-name {
      font-weight: 500;
      font-size: 0.88rem;
      color: #1a1510;
      margin-bottom: 3px;
      line-height: 1.4;
    }
    .rcpt-item-spec {
      display: inline-block;
      background: #f0ebe3;
      color: #7a6050;
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 5px;
    }
    .rcpt-item-gift {
      display: inline-block;
      background: #fdf0e8;
      color: #a06020;
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 5px;
      margin-left: 4px;
    }
    .rcpt-item-price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .rcpt-item-unit { font-size: 0.75rem; color: #a09080; }
    .rcpt-item-subtotal { font-weight: 600; font-size: 0.88rem; color: #1a1510; }

    /* Per-item status */
    .item-status {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 0.62rem;
      font-weight: 500;
      margin-top: 4px;
      white-space: nowrap;
    }
    .ist-waiting { background: #fef8ec; color: #c8a24a; }
    .ist-buying  { background: #fdf0e8; color: #b07352; }
    .ist-arrived { background: #eaf1f9; color: #5b7fa6; }
    .ist-shipped { background: #f5eefa; color: #7a5a8a; }
    .ist-cancel  { background: #fdeaea; color: #c97c7c; }

    /* ── Summary ── */
    .rcpt-summary {
      padding: 12px 0 4px;
    }
    .rcpt-summary-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
    }
    .rcpt-summary-label { font-size: 0.78rem; color: #9a8878; }
    .rcpt-summary-value { font-size: 0.78rem; color: #6a5848; }

    .rcpt-total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 16px 0 4px;
    }
    .rcpt-total-label {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.4rem;
      font-weight: 600;
      font-style: italic;
      letter-spacing: 4px;
      color: #b07352;
    }
    .rcpt-total-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: #b07352;
      letter-spacing: 1px;
    }
    .rcpt-balance-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0 10px;
    }
    .rcpt-balance-label { font-size: 0.72rem; color: #b8a898; }
    .rcpt-balance-value { font-size: 0.72rem; color: #9a8878; }

    .rcpt-note {
      margin: 4px 0 12px;
      padding: 8px 10px;
      background: #fdf6f0;
      border-radius: 3px;
      font-size: 0.72rem;
      color: #9a8878;
      line-height: 1.6;
    }

    /* ── Footer ── */
    .rcpt-footer {
      text-align: center;
      font-size: 0.58rem;
      letter-spacing: 4px;
      color: #c8b8a8;
      padding: 20px 28px 24px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="paper">

  <!-- Search Section -->
  <div class="search-section">
    <div class="brand-heading">Mina</div>
    <div class="brand-sub">妝日子 · Order Status</div>

    <label class="search-label">Order Number</label>
    <div class="search-row">
      <input type="text" class="search-input" id="order-input"
        placeholder="ORD-XXXXXXXX"
        autocomplete="off" autocorrect="off" spellcheck="false"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn-search" id="btn-search" onclick="doSearch()">查詢</button>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div id="hint" class="hint">
      訂單編號格式範例：<strong>ORD-20240501-001</strong><br>
      如有任何問題，歡迎直接傳訊息給我們 ☺
    </div>
  </div>

  <!-- Loading / Empty states -->
  <div class="spinner" id="spinner"></div>

  <div class="state-msg" id="empty-state" style="display:none">
    <div class="icon">🔍</div>
    <p>找不到此訂單編號<br><span style="font-size:0.72rem;color:#c8b8a8">請確認編號是否正確，或聯絡客服</span></p>
  </div>

  <!-- Receipt Area -->
  <div class="receipt-area" id="receipt-area">

    <div class="rcpt-title">ORDER LIST</div>
    <div class="rcpt-date-line" id="r-date"></div>
    <div class="rcpt-orderid-line" id="r-order-id"></div>
    <div class="rcpt-customer-line" id="r-customer"></div>

    <div class="rcpt-status-bar">
      <span class="order-status-badge" id="r-order-status"></span>
    </div>

    <hr class="rcpt-divider">

    <div class="rcpt-items" id="r-items"></div>

    <hr class="rcpt-divider">

    <div class="rcpt-summary" id="r-summary"></div>

    <div id="r-note"></div>

  </div>

  <!-- Footer (always visible at bottom of paper) -->
  <div class="rcpt-footer">Thank you for your order</div>

</div><!-- /paper -->

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import {
    getFirestore, collection, query, where, getDocs, limit
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAWWzDwfnPcPYXP7-yi10iQPq_wriZNUJg",
    authDomain: "minashop-c089a.firebaseapp.com",
    projectId: "minashop-c089a",
    storageBucket: "minashop-c089a.firebasestorage.app",
    messagingSenderId: "201093013608",
    appId: "1:201093013608:web:8b4e6b0f5506ca437fdbdd"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // Products cache (loaded once, used for images)
  let allProducts = null;

  async function getProducts() {
    if (allProducts) return allProducts;
    try {
      const snap = await getDocs(collection(db, 'products'));
      allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) {
      allProducts = [];
    }
    return allProducts;
  }

  function findProductImage(item, products) {
    if (!products || !products.length) return null;
    if (item.productId) {
      const p = products.find(p => p.id === item.productId);
      if (p) return (p.images || []).find(Boolean) || null;
    }
    const n = (item.name || '').replace(/<br>/gi, ' ').trim().toLowerCase();
    if (!n) return null;
    const p = products.find(p => {
      const pn = (p.name || '').replace(/<br>/gi, ' ').trim().toLowerCase();
      return pn === n || n.includes(pn) || pn.includes(n);
    });
    return p ? (p.images || []).find(Boolean) || null : null;
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function fmtDate(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return `DATE: ${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }
  function fmtMoney(n) {
    return `NT$${Number(n||0).toLocaleString()}`;
  }

  function getItemStatus(cfItem, orderShipped) {
    if (orderShipped) return { cls: 'ist-shipped', label: '已出貨' };
    if (!cfItem || (!cfItem.bought && !cfItem.arrived)) return { cls: 'ist-waiting', label: '備貨中' };
    if (cfItem.arrived) return { cls: 'ist-arrived', label: '已備妥' };
    if (cfItem.bought)  return { cls: 'ist-buying',  label: '採購中' };
    return { cls: 'ist-waiting', label: '備貨中' };
  }

  function getOrderBadge(o) {
    if (o.status === '已取消') return { cls: 'status-cancel', label: '已取消' };
    if (o.status === '待確認') return { cls: 'status-pending', label: '待確認' };
    const fs = o.fulfillmentStatus || '待採購';
    const map = {
      '待採購':  { cls: 'status-waiting', label: '備貨中' },
      '等待出貨':{ cls: 'status-buying',  label: '採購中' },
      '全數到貨':{ cls: 'status-arrived', label: '已備妥' },
      '已出貨':  { cls: 'status-shipped', label: '已出貨' },
    };
    return map[fs] || { cls: 'status-waiting', label: fs };
  }

  async function renderReceipt(o) {
    const products   = await getProducts();
    const cart       = o.confirmedCart || o.cart || [];
    const cf         = o.cartFulfillment || cart.map(() => ({ bought: false, arrived: false }));
    const isShipped  = (o.fulfillmentStatus === '已出貨');
    const isCancelled= (o.status === '已取消');

    // Header
    const badge = getOrderBadge(o);
    document.getElementById('r-date').textContent      = fmtDate(o.confirmedAt || o.createdAt);
    document.getElementById('r-order-id').textContent  = o.orderId || '';
    document.getElementById('r-customer').textContent  = o.customerName || '';
    const statusEl = document.getElementById('r-order-status');
    statusEl.className = 'order-status-badge ' + badge.cls;
    statusEl.textContent = badge.label;

    // Items (sorted alphabetically)
    const sortedItems = cart
      .map((it, idx) => ({ it, cfItem: cf[idx] || {}, idx }))
      .sort((a, b) =>
        (a.it.name||'').replace(/<br>/gi,' ')
          .localeCompare((b.it.name||'').replace(/<br>/gi,' '), 'zh-TW')
      );

    document.getElementById('r-items').innerHTML = sortedItems.map(({ it, cfItem }, i) => {
      const qty    = Number(it.qty) || 1;
      const sub    = (Number(it.price) || 0) * qty;
      const st     = isCancelled
        ? { cls: 'ist-cancel', label: '已取消' }
        : getItemStatus(cfItem, isShipped);

      const imgUrl  = findProductImage(it, products);
      const imgHtml = imgUrl
        ? `<img class="rcpt-item-img" src="${esc(imgUrl)}" crossorigin="anonymous" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const placeholderHtml = `<div class="rcpt-item-img-placeholder" style="${imgUrl ? 'display:none' : ''}">✦</div>`;

      const specHtml = (it.spec && it.spec !== '單一規格')
        ? `<span class="rcpt-item-spec">${esc(it.spec)}</span>` : '';
      const giftHtml = it.gift
        ? `<span class="rcpt-item-gift">贈：${esc(it.gift)}</span>` : '';

      const divider = i < sortedItems.length - 1
        ? '<hr class="rcpt-divider-dash">' : '';

      return `<div class="rcpt-item">
        ${imgHtml}${placeholderHtml}
        <div class="rcpt-item-content">
          <div class="rcpt-item-name">${esc((it.name||'').replace(/<br>/gi,' '))}</div>
          <div>${specHtml}${giftHtml}</div>
          <div class="rcpt-item-price-row">
            <span class="rcpt-item-unit">NT$${Number(it.price||0).toLocaleString()} × ${qty}</span>
            <span class="rcpt-item-subtotal">NT$${sub.toLocaleString()}</span>
          </div>
          <span class="item-status ${st.cls}">${st.label}</span>
        </div>
      </div>${divider}`;
    }).join('');

    // Summary
    const subtotal = cart.reduce((s, i) => s + (Number(i.price)||0) * (Number(i.qty)||1), 0);
    const deposit  = Number(o.confirmedDeposit ?? o.deposit ?? 0);
    const discount = Number(o.discount || 0);
    const total    = Number(o.confirmedTotal ?? o.total ?? subtotal);
    const balance  = Math.max(0, total - deposit);

    let sumHtml = `<div class="rcpt-summary-row">
      <span class="rcpt-summary-label">商品小計</span>
      <span class="rcpt-summary-value">$ ${subtotal.toLocaleString()}</span>
    </div>`;
    if (discount > 0)
      sumHtml += `<div class="rcpt-summary-row">
        <span class="rcpt-summary-label">折扣</span>
        <span class="rcpt-summary-value">-$ ${discount.toLocaleString()}</span>
      </div>`;
    if (deposit > 0)
      sumHtml += `<div class="rcpt-summary-row">
        <span class="rcpt-summary-label">已付定金</span>
        <span class="rcpt-summary-value">-$ ${deposit.toLocaleString()}</span>
      </div>`;

    sumHtml += `<div class="rcpt-total-row">
      <span class="rcpt-total-label">Total</span>
      <span class="rcpt-total-value">${fmtMoney(total)}</span>
    </div>`;

    if (deposit > 0)
      sumHtml += `<div class="rcpt-balance-row">
        <span class="rcpt-balance-label">尚餘尾款</span>
        <span class="rcpt-balance-value">${fmtMoney(balance)}</span>
      </div>`;

    document.getElementById('r-summary').innerHTML = sumHtml;
    document.getElementById('r-note').innerHTML = o.note
      ? `<div class="rcpt-note">📝 ${esc(o.note)}</div>` : '';

    document.getElementById('receipt-area').style.display = 'block';
  }

  window.doSearch = async function() {
    const raw = document.getElementById('order-input').value.trim().toUpperCase();
    if (!raw) return;

    document.getElementById('receipt-area').style.display = 'none';
    document.getElementById('empty-state').style.display  = 'none';
    document.getElementById('error-msg').style.display    = 'none';
    document.getElementById('hint').style.display         = 'none';
    document.getElementById('spinner').style.display      = 'block';
    document.getElementById('btn-search').disabled        = true;

    try {
      const q    = query(collection(db,'orders'), where('orderId','==',raw), limit(1));
      const snap = await getDocs(q);

      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btn-search').disabled   = false;

      if (snap.empty) {
        document.getElementById('empty-state').style.display = 'block';
      } else {
        const o = { id: snap.docs[0].id, ...snap.docs[0].data() };
        await renderReceipt(o);
      }
    } catch(e) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btn-search').disabled   = false;
      const em = document.getElementById('error-msg');
      em.textContent = '查詢失敗，請稍後再試。';
      em.style.display = 'block';
      console.error(e);
    }
  };
</script>

</body>
</html>
